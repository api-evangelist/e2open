specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: e2open
providerId: e2open
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Supply Chain
  - Logistics
description: e2open and the INTTRA ocean network do not publish a single canonical rate-limit specification.
  Per-module APIs apply tenant-scoped throttles enforced at the API gateway; consumers should consult
  the per-module developer guide and confirm thresholds with their account team.
notes: No publicly documented rate-limit numbers. INTTRA developer documentation requires authentication
  and partner agreement.
sources:
  - https://apidocs.inttra.com/
  - https://www.e2open.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
  quotaExceeded: 429
limits:
  - name: e2open Supply Chain API
    scope: tenant
    metric: varies
    limit: see module docs
  - name: INTTRA Ocean Execution API
    scope: tenant
    metric: varies
    limit: see INTTRA developer portal
  - name: Transportation Management API
    scope: tenant
    metric: varies
    limit: see TM developer guide
policies:
  - name: Token-based authentication
    description: INTTRA APIs require an OAuth-style token from the identity service before each session;
      tokens carry tenant-scope rate limits.
  - name: Backoff
    description: Implement exponential backoff with jitter; honor Retry-After when present.
  - name: Negotiated thresholds
    description: Higher thresholds available via the e2open / INTTRA account team and SOW.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
