naftiko: 1.0.0-alpha2
info:
  label: INTTRA Ocean Execution API (e2open) — Bookings
  description: 'INTTRA Ocean Execution API (e2open) — Bookings. 5 operations. Lead operation: List ocean bookings. Self-contained
    Naftiko capability covering one E2open business surface.'
  tags:
  - E2open
  - Bookings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    E2OPEN_API_KEY: E2OPEN_API_KEY
capability:
  consumes:
  - type: http
    namespace: inttra-ocean-execution-bookings
    baseUri: https://api.inttra.com/v1
    description: INTTRA Ocean Execution API (e2open) — Bookings business capability. Self-contained, no shared references.
    resources:
    - name: bookings
      path: /bookings
      operations:
      - name: listbookings
        method: GET
        description: List ocean bookings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: carrier
          in: query
          type: string
          description: Filter by carrier SCAC code
        - name: status
          in: query
          type: string
          description: Filter by booking status
        - name: originPort
          in: query
          type: string
          description: UN/LOCODE for origin port
        - name: destinationPort
          in: query
          type: string
          description: UN/LOCODE for destination port
        - name: bookedAfter
          in: query
          type: string
          description: Filter bookings created after this date (ISO 8601)
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createbooking
        method: POST
        description: Create an ocean booking
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bookings-bookingId
      path: /bookings/{bookingId}
      operations:
      - name: getbooking
        method: GET
        description: Get booking details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bookingId
          in: path
          type: string
          description: INTTRA booking identifier
          required: true
      - name: amendbooking
        method: PUT
        description: Amend an existing booking
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bookingId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: bookings-bookingId-cancel
      path: /bookings/{bookingId}/cancel
      operations:
      - name: cancelbooking
        method: POST
        description: Cancel a booking
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bookingId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.E2OPEN_API_KEY}}'
  exposes:
  - type: rest
    namespace: inttra-ocean-execution-bookings-rest
    port: 8080
    description: REST adapter for INTTRA Ocean Execution API (e2open) — Bookings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/bookings
      name: bookings
      description: REST surface for bookings.
      operations:
      - method: GET
        name: listbookings
        description: List ocean bookings
        call: inttra-ocean-execution-bookings.listbookings
        with:
          carrier: rest.carrier
          status: rest.status
          originPort: rest.originPort
          destinationPort: rest.destinationPort
          bookedAfter: rest.bookedAfter
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbooking
        description: Create an ocean booking
        call: inttra-ocean-execution-bookings.createbooking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bookings/{bookingid}
      name: bookings-bookingid
      description: REST surface for bookings-bookingId.
      operations:
      - method: GET
        name: getbooking
        description: Get booking details
        call: inttra-ocean-execution-bookings.getbooking
        with:
          bookingId: rest.bookingId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: amendbooking
        description: Amend an existing booking
        call: inttra-ocean-execution-bookings.amendbooking
        with:
          bookingId: rest.bookingId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bookings/{bookingid}/cancel
      name: bookings-bookingid-cancel
      description: REST surface for bookings-bookingId-cancel.
      operations:
      - method: POST
        name: cancelbooking
        description: Cancel a booking
        call: inttra-ocean-execution-bookings.cancelbooking
        with:
          bookingId: rest.bookingId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: inttra-ocean-execution-bookings-mcp
    port: 9090
    transport: http
    description: MCP adapter for INTTRA Ocean Execution API (e2open) — Bookings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-ocean-bookings
      description: List ocean bookings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: inttra-ocean-execution-bookings.listbookings
      with:
        carrier: tools.carrier
        status: tools.status
        originPort: tools.originPort
        destinationPort: tools.destinationPort
        bookedAfter: tools.bookedAfter
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: create-ocean-booking
      description: Create an ocean booking
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inttra-ocean-execution-bookings.createbooking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-booking-details
      description: Get booking details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: inttra-ocean-execution-bookings.getbooking
      with:
        bookingId: tools.bookingId
      outputParameters:
      - type: object
        mapping: $.
    - name: amend-existing-booking
      description: Amend an existing booking
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: inttra-ocean-execution-bookings.amendbooking
      with:
        bookingId: tools.bookingId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-booking
      description: Cancel a booking
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: inttra-ocean-execution-bookings.cancelbooking
      with:
        bookingId: tools.bookingId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
