specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: e2open
providerId: e2open
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Supply Chain
  - Logistics
  - Trade Management
  - Visibility
description: e2open is a connected supply-chain network and SaaS platform (including the INTTRA ocean
  network and Transportation Management). API access is bundled into per-customer SaaS contracts; e2open
  does not publish a per-call price list. Plans below capture the documented commercial archetype but
  prices remain provider-confirmed.
notes: e2open does not publish public per-call API pricing. Pricing is contract-based per supply-chain
  module; replace placeholders with values from your e2open account team.
sources:
  - https://www.e2open.com/
  - https://apidocs.inttra.com/
  - https://marketplace.e2open.com/
plans:
  - id: e2open-platform-subscription
    name: e2open Connected Network Subscription
    type: enterprise
    description: Per-module SaaS subscription covering one or more capabilities (Supply Chain, Transportation,
      Trade & Customs, Channel, Subscriber Network). API access is included with the subscribed modules.
    entries:
      - label: Module subscription
        name: module_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Connected partner network (400k+ partners)
      - name: Per-module API access
      - name: EDI / X12 / REST connectivity
  - id: e2open-inttra
    name: INTTRA Ocean Execution
    type: enterprise
    description: Subscription to the INTTRA ocean booking and tracking network. Pricing not publicly listed.
    entries:
      - label: Booking transactions
        name: ocean_bookings
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Ocean booking REST API
      - name: Schedules and rates
      - name: Track and trace
  - id: e2open-transportation
    name: Transportation Management
    type: enterprise
    description: Carrier-integration, rating, and appointment-scheduling APIs. Pricing not publicly listed.
    entries:
      - label: Carrier integration
        name: carrier_integration
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Appointment scheduling
      - name: Real-time rating
      - name: Document POST API
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
