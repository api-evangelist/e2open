specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: e2open
providerId: e2open
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Supply Chain
  - Logistics
description: 'FOCUS-aligned FinOps for e2open: per-module SaaS subscription plus per-transaction meters
  (bookings, shipments, customs filings) governed by the contract. Public per-call pricing is not published.'
notes: e2open does not publish public API pricing. Reconcile FOCUS columns and per-meter rates against
  the master subscription agreement.
sources:
  - https://www.e2open.com/
  - https://apidocs.inttra.com/
  - https://marketplace.e2open.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: E2open, LLC
serviceCategory: Supply Chain
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: e2open Connected Network
  ServiceCategory: Supply Chain
  ProviderName: e2open
  PublisherName: E2open, LLC
  InvoiceIssuerName: E2open, LLC
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - module
      - tenant
  - name: ocean_bookings
    unit: transaction
    aggregation: sum
    dimensions:
      - carrier
      - lane
  - name: shipments_tracked
    unit: shipment
    aggregation: sum
    dimensions:
      - mode
      - region
  - name: customs_filings
    unit: filing
    aggregation: sum
    dimensions:
      - country
  - name: module_seats
    unit: seat
    aggregation: sum
    dimensions:
      - module
principles:
  - name: Visibility
    description: Use the e2open Marketplace usage reports and per-module dashboards to see consumption;
      pull invoice line items into FOCUS-formatted tables.
  - name: Allocation
    description: Tag bookings/shipments/filings with originating business unit; charge back module subscriptions
      to owning logistics team.
  - name: Optimization
    description: Consolidate ocean carriers through INTTRA to leverage volume; reduce module count at
      renewal where capabilities overlap.
  - name: Accountability
    description: Supply-chain operations owns the e2open subscription and reviews monthly usage against
      forecast.
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
